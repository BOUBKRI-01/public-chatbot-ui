<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clio E-TECH - Assistant Interactif</title>
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
</head>
<body>

    <div class="main-container">
        <div class="visual-panel">
            <div class="robot-box">
                <div class="robot-avatar" id="robot-avatar">
                    <div class="eye left"></div>
                    <div class="eye right"></div>
                    <div class="mouth" id="robot-mouth"></div>
                </div>
                <p id="robot-status">Système prêt</p>
            </div>
            
            <div id="car-3d-container"></div>
        </div>

        <div class="chat-container">
            <div class="chat-header">
                <h2>🚗 Assistant Clio E-TECH</h2>
                <div class="mode-selector">
                    <button id="btn-general" class="active" onclick="setMode('general')">🧠 Général</button>
                    <button id="btn-voiture" onclick="setMode('voiture')">⚙️ Spécifications</button>
                </div>
            </div>

            <div class="chat-box" id="chat-box">
                <div class="message bot">Bonjour ! Je suis l'assistant de votre Clio E-TECH. Comment puis-je vous aider ?</div>
            </div>

            <div class="chat-input-area">
                <input type="text" id="user-input" placeholder="Écrivez votre message..." onkeypress="checkEnter(event)">
                <button id="btn-send" onclick="sendQuestion()">⚡</button>
                <button id="btn-mic" onclick="toggleMic()">🎤</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
